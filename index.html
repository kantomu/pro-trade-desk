<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#080a0e" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icon.svg" />
<title>Trade Desk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap');
:root{ --bg:#080a0e;--panel:#14161d;--panel2:#1a1d26;--border:#272b35;--border2:#343a46;--text:#e9ebf0;--muted:#888fa0;--gold:#e3b341;--up:#5fd08a;--down:#ff6f6f;--mid:#9aa0ac; }
[data-theme="light"]{ --bg:#f3f2ec;--panel:#fff;--panel2:#f8f7f1;--border:#e4e2d8;--border2:#d4d1c4;--text:#1b1c1e;--muted:#6a6d75;--gold:#b8862a; }
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;position:relative;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(40% 30% at 12% 0%,color-mix(in srgb,var(--gold) 16%,transparent),transparent 70%),radial-gradient(45% 35% at 90% 8%,rgba(78,201,176,.13),transparent 70%),radial-gradient(50% 40% at 50% 100%,rgba(106,160,255,.10),transparent 70%)}
.wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:0 15px calc(48px + env(safe-area-inset-bottom))}
header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:calc(12px + env(safe-area-inset-top)) 0 12px;margin-bottom:10px;position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px}
.diamond{color:var(--gold);font-size:17px;filter:drop-shadow(0 0 10px color-mix(in srgb,var(--gold) 70%,transparent));animation:spin 14s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.bname{font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:1.6px;font-size:14px}.bname span{color:var(--gold)}
.bsub{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--muted)}
.hr{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace}
.live{display:flex;align-items:center;gap:5px;font-size:11px}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--up);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--up) 60%,transparent)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
.tbtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:13px}
.pulse-row{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none}.pulse-row::-webkit-scrollbar{display:none}
.tk{flex:none;background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:7px 11px;min-width:94px}
.tk .k{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--muted)}
.tk .p{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
.tk .d{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600}
.cdwrap{display:flex;gap:9px;margin-bottom:12px;flex-wrap:wrap}
.cd{flex:1;min-width:150px;background:linear-gradient(135deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:13px;padding:11px 13px}
.cd .lab{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
.cd .val{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700;margin-top:2px}
.cd .sub2{font-size:10px;color:var(--muted);margin-top:1px}
.cd.cpi{border-color:color-mix(in srgb,var(--gold) 40%,transparent)}.cd.cpi .val{color:var(--gold)}
.cd .ses{display:flex;gap:4px;margin-top:6px}.cd .ses span{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 5px;border:1px solid var(--border2);border-radius:4px;color:var(--muted)}
.cd .ses span.on{color:var(--bg);background:var(--up);border-color:var(--up)}
.meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:11px;line-height:1.6}.meta b{color:var(--gold)}
.legend{font-size:10px;color:var(--muted);margin:-2px 4px 12px;font-family:'JetBrains Mono',monospace}
.grouphead{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;margin:20px 4px 9px;display:flex;align-items:center;gap:8px}.grouphead::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
details.acc{background:color-mix(in srgb,var(--panel) 92%,transparent);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;position:relative;backdrop-filter:blur(6px)}
details.acc::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);box-shadow:0 0 14px color-mix(in srgb,var(--accent) 55%,transparent)}
details.acc[open]{border-color:color-mix(in srgb,var(--accent) 35%,var(--border));box-shadow:0 10px 34px -18px color-mix(in srgb,var(--accent) 60%,transparent)}
summary.sum{list-style:none;cursor:pointer;display:flex;align-items:center;gap:9px;padding:13px 14px 13px 15px;-webkit-tap-highlight-color:transparent}summary.sum::-webkit-details-marker{display:none}
.dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex:none;box-shadow:0 0 10px var(--accent)}
.ttl{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:13.5px;flex:none}.ttl small{font-weight:500;font-size:11px;color:var(--muted)}
.sub{font-size:10.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chev{margin-left:auto;color:var(--muted);transition:transform .25s;flex:none;font-size:12px}details[open]>.sum .chev{transform:rotate(90deg);color:var(--accent)}
.inner{padding:4px 15px 15px}details[open]>.inner{border-top:1px solid var(--border);padding-top:12px;animation:reveal .34s ease both}
@keyframes reveal{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
h4{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--accent);text-transform:uppercase;margin:11px 0 3px}h4:first-child{margin-top:0}
p{font-size:12.8px;line-height:1.7;margin-bottom:4px}.q{color:var(--muted)}
.note{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);line-height:1.5;margin-top:8px}
.src{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;margin:2px 3px 0 0;cursor:pointer}.src:active{color:var(--accent,#e3b341)}
.up{color:var(--up)}.down{color:var(--down)}.mid{color:var(--mid)}
.cs{display:flex;align-items:center;gap:9px;margin:5px 0;font-family:'JetBrains Mono',monospace;font-size:11px}
.cl{width:42px;font-weight:700}
.ct{flex:1;display:flex;align-items:stretch;height:13px;background:var(--panel2);border:1px solid var(--border);border-radius:7px;overflow:hidden}
.ct .h{flex:1;display:flex}.ct .h.l{justify-content:flex-end}.ct .h.r{justify-content:flex-start}.ct .m{width:1px;flex:none;background:var(--border2)}.ct .f{height:100%}
.ct .f.pos{background:linear-gradient(90deg,color-mix(in srgb,var(--up) 55%,transparent),var(--up));border-radius:0 5px 5px 0;transform-origin:left}
.ct .f.neg{background:linear-gradient(270deg,color-mix(in srgb,var(--down) 55%,transparent),var(--down));border-radius:5px 0 0 5px;transform-origin:right}
details[open] .ct .f{animation:grow .7s cubic-bezier(.2,.85,.25,1) both}@keyframes grow{from{transform:scaleX(0)}}
.cv{width:54px;text-align:right;color:var(--muted)}.cvw{width:96px;text-align:right;line-height:1.15}.cvw small{color:var(--muted);font-size:9px}
.mac{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}@media(max-width:560px){.mac{grid-template-columns:repeat(2,1fr)}}
.mi{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:8px 9px}.mn{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace}.mv{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;display:block}.mc{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600}
.cmp{width:100%;border-collapse:collapse;font-size:11.5px;font-family:'JetBrains Mono',monospace}.cmp th{text-align:left;color:var(--muted);font-size:8.5px;font-weight:500;padding:0 5px 6px}.cmp td{padding:7px 5px;border-top:1px solid var(--border)}.cmp .sy{font-weight:700}
.vb{font-size:9px;padding:2px 7px;border-radius:10px;white-space:nowrap}.vb.x{color:var(--down);border:1px solid color-mix(in srgb,var(--down) 45%,transparent)}.vb.o{color:var(--up);border:1px solid color-mix(in srgb,var(--up) 45%,transparent)}.vb.n{color:var(--mid);border:1px solid color-mix(in srgb,var(--mid) 40%,transparent)}
.week{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}.week .ev{font-family:'JetBrains Mono',monospace;font-size:10.5px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:5px 9px}.week .ev b{color:var(--gold)}
.bp{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;flex:none}.bp.bull{color:var(--up);border:1px solid color-mix(in srgb,var(--up) 45%,transparent)}.bp.bear{color:var(--down);border:1px solid color-mix(in srgb,var(--down) 45%,transparent)}.bp.neut{color:var(--mid);border:1px solid color-mix(in srgb,var(--mid) 40%,transparent)}
/* scorecard */
@property --p{syntax:'<number>';initial-value:0;inherits:false}
.sc-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}.sc-tab{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 11px;border-radius:9px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);cursor:pointer}.sc-tab.on{color:var(--bg);background:#7ee0c0;border-color:#7ee0c0;font-weight:700}
.sc-dir{display:flex;gap:6px;margin-bottom:12px}.sc-dir button{flex:1;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px;border-radius:9px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);cursor:pointer}.sc-dir button.on.long{color:#06140d;background:var(--up);border-color:var(--up)}.sc-dir button.on.short{color:#1a0606;background:var(--down);border-color:var(--down)}
.sc-gauge{display:flex;align-items:center;gap:15px;margin:6px 0 12px}
.sc-ring{width:86px;height:86px;border-radius:50%;flex:none;background:conic-gradient(var(--gc,var(--up)) calc(var(--p,0)*1%),var(--border) 0);display:flex;align-items:center;justify-content:center;position:relative;transition:--p .55s ease}.sc-ring::before{content:"";position:absolute;inset:8px;border-radius:50%;background:var(--panel)}.sc-ring .pct{position:relative;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:21px}
.sc-meta{flex:1;min-width:0}.sc-tier{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;font-size:18px}.sc-verdict{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px}
.sc-flags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}.sc-flag{font-size:9px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:10px;border:1px solid var(--down);color:var(--down)}.sc-flag.ok{border-color:var(--up);color:var(--up)}
.sc-sec-t{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin:11px 0 4px}
.sc-f{display:flex;align-items:center;gap:9px;padding:5px 0;border-top:1px solid var(--border);font-size:11.5px}.sc-f .ic{width:14px;text-align:center;font-family:'JetBrains Mono',monospace;font-weight:700;flex:none}.sc-f .fl{flex:1}.sc-f .fl small{color:var(--muted);font-size:9.5px}.sc-f .fr{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted)}.sc-f.sup .ic{color:var(--up)}.sc-f.ag .ic{color:var(--down)}.sc-f.nu .ic{color:var(--mid)}
.sc-chip{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;border-radius:9px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);cursor:pointer;margin:0 5px 5px 0;user-select:none}.sc-chip.on{color:var(--up);border-color:color-mix(in srgb,var(--up) 55%,transparent)}.sc-chip.gate.on{color:var(--gold);border-color:color-mix(in srgb,var(--gold) 60%,transparent)}
.banner{background:color-mix(in srgb,var(--down) 14%,var(--panel));border:1px solid color-mix(in srgb,var(--down) 40%,transparent);color:var(--text);border-radius:11px;padding:10px 13px;font-size:11.5px;margin-bottom:12px;font-family:'JetBrains Mono',monospace}
.subdiv{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin:13px 4px 7px}.subdiv.on{color:var(--gold)}
.legend2{font-size:9.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin:1px 4px 9px;line-height:1.55}
.sesb{font-family:'JetBrains Mono',monospace;font-size:8.5px;padding:2px 6px;border-radius:6px;border:1px solid var(--border2);color:var(--muted);white-space:nowrap}
.sesb.on{color:#06140d;background:var(--gold);border-color:var(--gold);font-weight:700}
.star{font-family:'JetBrains Mono',monospace;font-size:8.5px;padding:2px 6px;border-radius:6px;font-weight:700;white-space:nowrap}
.star.up{color:var(--up);border:1px solid color-mix(in srgb,var(--up) 55%,transparent)}.star.down{color:var(--down);border:1px solid color-mix(in srgb,var(--down) 55%,transparent)}
.ptag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;margin:0 0 6px}
summary.sum{flex-wrap:wrap}
footer{margin-top:22px;padding-top:14px;border-top:1px solid var(--border);color:var(--muted);font-size:10.5px;line-height:1.7}
</style>
</head>
<body data-theme="dark">
<div class="wrap">
  <header>
    <div class="brand"><span class="diamond">◆</span><div><div class="bname">TRADE <span>DESK</span></div><div class="bsub">auto-updating · PWA</div></div></div>
    <div class="hr"><div class="live"><span class="pulse"></span><b id="utc">--:--:--</b></div><button class="tbtn" id="theme">☀</button></div>
  </header>
  <div id="banner"></div>
  <div class="pulse-row" id="pulse"></div>
  <div class="cdwrap">
    <div class="cd"><div class="lab">次セッション / 更新目安</div><div class="val" id="cdSession">--:--:--</div><div class="sub2" id="cdSessionName">—</div><div class="ses" id="sess"></div></div>
    <div class="cd cpi"><div class="lab">米CPIまで ★</div><div class="val" id="cdCpi">--</div><div class="sub2">水 21:30 JST</div></div>
  </div>
  <div class="meta" id="meta">読み込み中…</div>
  <div class="legend">▸ タップで詳細展開。［　］＝出所（長押しで元記事へ）。3時間ごと自動更新。</div>
  <div id="app"></div>
  <footer id="foot"></footer>
</div>

<script>
/* ---------- service worker ---------- */
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }

/* ---------- clock / sessions / countdowns ---------- */
function pad(n){return String(n).padStart(2,'0');}
function clock(){
  var now=new Date();
  document.getElementById('utc').textContent=now.toISOString().slice(11,19)+'Z';
  if(typeof SESS!=='undefined'){
    var order=['SYD','TOK','LDN','NY'];
    var se=document.getElementById('sess'); if(se) se.innerHTML=order.map(k=>'<span class="'+(sesActive(k,now)?'on':'')+'">'+k+'</span>').join('');
    var nextK=null,nextMs=null; order.forEach(function(k){ if(!sesActive(k,now)){var ms=msUntilOpen(k,now);if(ms!=null&&(nextMs==null||ms<nextMs)){nextMs=ms;nextK=k;}} });
    var cs=document.getElementById('cdSession');
    if(cs){ if(nextK!=null){var s=Math.floor(nextMs/1000);cs.textContent=pad(Math.floor(s/3600))+':'+pad(Math.floor(s%3600/60))+':'+pad(s%60);document.getElementById('cdSessionName').textContent=SESS[nextK].jp+'開場まで';} else {cs.textContent='OPEN';document.getElementById('cdSessionName').textContent='主要市場 取引時間中';} }
    if(typeof PAIRS!=='undefined') PAIRS.forEach(function(p){ var el=document.getElementById('co_'+p); if(!el)return; var st=pairSession(p,now); if(st.active){el.className='sesb on';el.textContent='⚡'+st.activeName;} else if(st.next){el.className='sesb';el.textContent=st.next.name+' '+fmtDur(st.next.ms);} else {el.className='sesb';el.textContent='—';} });
  }
  var cpi=nextWed1230()-now.getTime(),el=document.getElementById('cdCpi');
  if(el){ if(cpi<=0)el.textContent='発表時間帯'; else{var d=Math.floor(cpi/864e5),hh=Math.floor(cpi%864e5/36e5),mm=Math.floor(cpi%36e5/6e4);el.textContent=d+'日 '+pad(hh)+':'+pad(mm);} }
}
function nextWed1230(){ // next Wed 12:30 UTC (approx US CPI slot)
  var n=new Date(),day=n.getUTCDay(),add=(3-day+7)%7; var t=new Date(Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),n.getUTCDate()+add,12,30,0));
  if(t.getTime()<n.getTime())t=new Date(t.getTime()+7*864e5); return t.getTime();
}
setInterval(clock,1000); clock();
document.getElementById('theme').onclick=function(){var b=document.body,d=b.getAttribute('data-theme')==='dark';b.setAttribute('data-theme',d?'light':'dark');this.textContent=d?'☾':'☀';};

/* ---------- load data (timeout + offline fallback) ---------- */
var DATA=null;
async function load(){
  var ctrl=new AbortController(),t=setTimeout(()=>ctrl.abort(),12000);
  try{
    var r=await fetch('./data.json?t='+Date.now(),{signal:ctrl.signal,cache:'no-store'}); clearTimeout(t);
    var d=await r.json();
    if(!r.ok || !d || !d.prices) throw new Error('api');
    DATA=d; render(false);
  }catch(e){
    clearTimeout(t);
    try{ var c=await fetch('./data.json'); DATA=await c.json(); render(true); }
    catch(e2){ document.getElementById('meta').innerHTML='<span class="down">データ取得に失敗しました。</span>'; }
  }
}

/* ---------- helpers ---------- */
function sgn(x){return x>0?1:x<0?-1:0;}
function fmtN(n){return (n==null||isNaN(n))?'—':Number(n).toLocaleString('en-US');}
function acc(accent,ttl,sub,inner,open){return '<details class="acc" style="--accent:'+accent+'"'+(open?' open':'')+'><summary class="sum"><span class="dot"></span><span class="ttl">'+ttl+'</span><span class="sub">'+(sub||'')+'</span><span class="chev">▸</span></summary><div class="inner">'+inner+'</div></details>';}
function divBar(sign,wpct,labelHtml,col){ // sign +1 right(green)/-1 left(red)
  var fill='<span class="f '+(sign>0?'pos':'neg')+'" style="width:'+Math.min(100,wpct)+'%"></span>';
  var L=sign<0?fill:'', R=sign>0?fill:'';
  return '<div class="cs"><span class="cl">'+labelHtml+'</span><div class="ct"><div class="h l">'+L+'</div><div class="m"></div><div class="h r">'+R+'</div></div><span class="'+(col?'cv cvw':'cv')+'" style="'+(col?'color:'+col:'')+'">';
}

/* ---------- pair config ----------
   liq = global turnover share % (BIS 2022, gold=proxy) for liquidity ordering
   ses = advantaged trading sessions ; tag = character ; dec = decimals */
var PC={
  EURUSD:{n:'ユーロドル',c:'#6aa0ff',q:'EURUSD',cot:'EUR',base:'EUR',quote:'USD',dec:4,liq:22.7,ses:['LDN','NY'],tag:'最大流動性・対ドル基軸・米欧金利差'},
  USDJPY:{n:'ドル円',c:'#4ec9b0',q:'USDJPY',cot:'JPY',base:'USD',quote:'JPY',dec:2,liq:13.5,ses:['TOK','LDN','NY'],tag:'日米金利差・リスク・介入警戒'},
  GBPUSD:{n:'ポンドドル',c:'#e08a9b',q:'GBPUSD',cot:'GBP',base:'GBP',quote:'USD',dec:4,liq:9.5,ses:['LDN','NY'],tag:'英BOE金利・対ドル'},
  XAUUSD:{n:'ゴールド',c:'#e3b341',q:'GCUSD',cot:'GOLD',base:'gold',dec:1,liq:9,ses:['LDN','NY'],tag:'実質金利・有事/地政学・ドル逆相関'},
  USDCAD:{n:'米ドル/加ドル',c:'#e0a96b',q:'USDCAD',cot:'CAD',base:'USD',quote:'CAD',dec:4,liq:5.5,ses:['NY'],tag:'原油相関・北米指標'},
  AUDUSD:{n:'豪ドル/米ドル',c:'#5fd0c0',q:'AUDUSD',cot:'AUD',base:'AUD',quote:'USD',dec:4,liq:5.1,ses:['SYD','TOK'],tag:'資源国・中国景気・リスク代理'},
  EURJPY:{n:'ユーロ円',c:'#c792ea',q:'EURJPY',cot:'EURJPY',base:'EUR',quote:'JPY',dec:2,liq:1.9,ses:['TOK','LDN'],tag:'リスク選好クロス'},

/* ---------- FX sessions (DST-aware via Intl timeZone) ---------- */
var SESS={
  SYD:{tz:'Australia/Sydney',o:7,c:16,jp:'シドニー'},
  TOK:{tz:'Asia/Tokyo',o:9,c:18,jp:'東京'},
  LDN:{tz:'Europe/London',o:8,c:16,jp:'ロンドン'},
  NY:{tz:'America/New_York',o:8,c:17,jp:'NY'}
};
function tzParts(tz,date){var f=new Intl.DateTimeFormat('en-US',{timeZone:tz,hour12:false,weekday:'short',hour:'2-digit',minute:'2-digit'});var o={};f.formatToParts(date).forEach(p=>o[p.type]=p.value);if(o.hour==='24')o.hour='00';return o;}
function tzOffMin(tz,date){var f=new Intl.DateTimeFormat('en-US',{timeZone:tz,hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});var o={};f.formatToParts(date).forEach(p=>o[p.type]=p.value);if(o.hour==='24')o.hour='00';var asUTC=Date.UTC(+o.year,+o.month-1,+o.day,+o.hour,+o.minute,+o.second);return Math.round((asUTC-date.getTime())/6e4);}
function sesActive(k,date){var s=SESS[k],pr=tzParts(s.tz,date),hr=+pr.hour+(+pr.minute)/60,wd=pr.weekday;if(wd==='Sat'||wd==='Sun')return false;return hr>=s.o&&hr<s.c;}
function msUntilOpen(k,date){var s=SESS[k],off=tzOffMin(s.tz,date),lnMs=date.getTime()+off*6e4,ln=new Date(lnMs);
  for(var add=0;add<8;add++){var t=Date.UTC(ln.getUTCFullYear(),ln.getUTCMonth(),ln.getUTCDate()+add,s.o,0,0);if(t<=lnMs)continue;var wd=new Date(t).getUTCDay();if(wd===6||wd===0)continue;return (t-off*6e4)-date.getTime();}
  return null;}
function pairSession(p,date){var list=PC[p].ses||[],active=false,activeName='',best=null;
  list.forEach(function(k){ if(sesActive(k,date)){active=true;if(!activeName)activeName=SESS[k].jp;} else {var ms=msUntilOpen(k,date);if(ms!=null&&(best==null||ms<best.ms))best={ms:ms,name:SESS[k].jp};} });
  return {active:active,activeName:activeName,next:best};}
function fmtDur(ms){if(ms==null)return'—';if(ms<0)ms=0;var h=Math.floor(ms/36e5),m=Math.floor(ms%36e5/6e4);return h>0?(h+'h'+pad(m)+'m'):(m+'m');}
/* auto-confluence conviction (data-only) for the ★ tradeable marker */
function autoConviction(p){var F=autoFactors(p),pos=0,neg=0,tot=0;F.forEach(function(f){tot+=f.w;if(f.sign>0)pos+=f.w;else if(f.sign<0)neg+=f.w;});if(!tot)return{dir:0,mag:0};var net=(pos-neg)/tot;return{dir:net>0?1:net<0?-1:0,mag:Math.abs(net)};}

function autoFactors(p){
  var cf=PC[p],pr=DATA.prices[cf.q]||{},sm=strengthMap(),cot=DATA.cot||{},ret=(DATA.analysis&&DATA.analysis.retail&&DATA.analysis.retail[p])||{};
  var F=[];
  // HTF
  var htf=0,note='—';
  if(pr.price!=null&&pr.ma50&&pr.ma200){ if(pr.price>pr.ma50&&pr.price>pr.ma200){htf=1;note='MA上＝上昇';} else if(pr.price<pr.ma50&&pr.price<pr.ma200){htf=-1;note='MA下＝下降';} else{htf=0;note='MA混在';} }
  else note='MA無し(算出値)';
  F.push({k:'HTF移動平均',w:3,sign:htf,note:note});
  // strength
  var st=0,sn='';
  if(p==='XAUUSD'){ st=sgn(-(sm.USD||0)); sn='USD '+(sm.USD>0?'強→金逆風':'弱→金支持'); }
  else { var diff=(sm[cf.base]||0)-(sm[cf.quote]||0); st=sgn(diff); sn=cf.base+(diff>0?'>':'<')+cf.quote; }
  F.push({k:'通貨強弱',w:2,sign:st,note:sn});
  // COT
  var cs=0,cn='';
  if(p==='USDJPY'){ var j=cot.JPY; if(j){cs=sgn(-j.net);cn='円'+(j.net<0?'売越→USDJPY支持':'買越');} }
  else if(p==='EURJPY'){ var e=cot.EUR,jj=cot.JPY; if(e&&jj){cs=sgn(sgn(e.net)+(-sgn(jj.net)));cn='EUR/円建玉から';} }
  else if(p==='GBPJPY'){ var g=cot.GBP,j2=cot.JPY; if(g&&j2){cs=sgn(sgn(g.net)+(-sgn(j2.net)));cn='GBP/円建玉から';} }
  else if(p==='USDCAD'){ var cc=cot.CAD; if(cc){cs=sgn(-cc.net);cn='加ドル'+(cc.net<0?'売越→USDCAD支持':'買越→USDCAD重い');} }
  else { var c=cot[cf.cot]; if(c){cs=sgn(c.net);cn='ネット'+(c.net>0?'買越':'売越')+' '+fmtN(c.net);} }
  F.push({k:'大口COT',w:2,sign:cs,note:cn});

  var rs=0,rn='要確認';
  if(ret.s!=null){ rs=ret.s>52?1:ret.s<48?-1:0; rn='個人S'+ret.s+'→逆張り'+(rs>0?'買い':'売り')+'寄り'; }
  F.push({k:'個人(逆張り)',w:1.5,sign:rs,note:rn});
  return F;
}

  if(man.rr)flags.push({t:'RR≥2',ok:true});else{flags.push({t:'RR<2/未確認',ok:false});cap=Math.max(cap,2);}
  var cotG=DATA.cot&&DATA.cot.GOLD,gpr=DATA.prices.GCUSD;
  if(SC.cur==='XAUUSD'&&dir===1&&cotG&&cotG.net>120000&&gpr&&gpr.chg<0){flags.push({t:'COTロング過熱',ok:false});cap=Math.max(cap,2);}
  var uj=DATA.prices.USDJPY; if(SC.cur==='USDJPY'&&dir===1&&uj&&uj.yearHigh&&uj.price>=uj.yearHigh-0.4){flags.push({t:'介入帯警戒',ok:false});cap=Math.max(cap,2);}
  var tier;if(pct>=72)tier=1;else if(pct>=55)tier=2;else if(pct>=42)tier=3;else tier=0;if(tier>0)tier=Math.max(tier,cap);if(veto)tier=0;
  var tierTxt=['見送り','ティア1（フル）','ティア2（縮小）','ティア3（打診）'][tier];
  var gc=dir===1?'var(--up)':'var(--down)',ring=document.getElementById('scRing');
  ring.style.setProperty('--p',pct);ring.style.setProperty('--gc',gc);
  document.getElementById('scPct').textContent=pct+'%';document.getElementById('scPct').style.color=gc;
  var te=document.getElementById('scTier');te.textContent=tierTxt;te.style.color=tier===0?'var(--mid)':tier===1?'var(--up)':'var(--gold)';
  document.getElementById('scVerdict').textContent=SC.cur+' '+(dir===1?'買い':'売り')+'：適合度 '+pct+'%';
  document.getElementById('scFlags').innerHTML=flags.map(f=>'<span class="sc-flag'+(f.ok?' ok':'')+'">'+f.t+'</span>').join('');
  document.getElementById('scNote').textContent='あなたのルール整理＝判断材料（売買助言ではありません）。チャート項目は5M/15Mで確認しタップ。';
}
