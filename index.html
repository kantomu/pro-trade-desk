<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d08" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<title>Macro Mixer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap');

/* ============ tokens — Bullion Terminal (from the MM emblem) ============ */
:root{
  --ink:#0b0d08; --felt:#12150d; --moss:#181d11; --seam:#2b3320; --seam2:#3c4628;
  --text:#ece9da; --mut:#9aa18a; --mut2:#6f765f;
  --gold:#d9a93c; --brass:#f1d491; --goldline:rgba(217,169,60,.32);
  --long:#6fd6a0; --short:#ff8484; --flat:#9aa18a;
  --c-eu:#8fb7ff; --c-uj:#5ecfb4; --c-gu:#e899ab; --c-xa:#d9a93c; --c-uc:#e0aa6d; --c-au:#6fd0c4; --c-ej:#c9a0ef; --c-gj:#de96d6;
  --r:16px; --r2:12px;
  --shadow:0 18px 40px -22px rgba(0,0,0,.85);
}
[data-theme="light"]{
  --ink:#efeadb; --felt:#f9f6ec; --moss:#f1ecdd; --seam:#dcd4ba; --seam2:#c8bfa0;
  --text:#211f15; --mut:#6e6c58; --mut2:#94917b;
  --gold:#a87b1f; --brass:#8a6516; --goldline:rgba(168,123,31,.4);
  --long:#1f9d65; --short:#cf4a4a; --flat:#7a785f;
  --shadow:0 14px 30px -20px rgba(70,60,20,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--ink); color:var(--text);
  font-family:'Noto Sans JP',sans-serif; font-size:13px; line-height:1.7;
  min-height:100dvh; overflow-x:hidden;
}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(60% 38% at 50% -6%, rgba(217,169,60,.12), transparent 70%),
    radial-gradient(45% 30% at 100% 14%, rgba(110,214,160,.05), transparent 70%),
    radial-gradient(55% 40% at 0% 100%, rgba(143,183,255,.05), transparent 70%);
}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.disp{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900}
.up{color:var(--long)} .down{color:var(--short)} .mid{color:var(--flat)}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
:focus-visible{outline:2px solid var(--brass);outline-offset:2px;border-radius:6px}
::-webkit-scrollbar{height:0;width:0}

/* ============ shell ============ */
.shell{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:0 14px}
header.top{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:10px;
  padding:calc(10px + env(safe-area-inset-top)) 2px 10px;
  background:color-mix(in srgb,var(--ink) 86%, transparent);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--seam);
}
.mark{width:30px;height:30px;border-radius:50%;flex:none;border:1px solid var(--goldline);overflow:hidden}
.mark img{width:100%;height:100%;display:block;object-fit:cover}
.wordmark{line-height:1.05}
.wordmark .l1{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:13.5px;letter-spacing:2.2px}
.wordmark .l1 b{color:var(--gold);font-weight:800}
.wordmark .l2{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1.8px;color:var(--mut2)}
.top .sp{flex:1}
.clock{display:flex;align-items:center;gap:6px;font-size:11.5px}
.cstack{text-align:right;line-height:1.15}
.cstack b{display:block;font-size:11px;font-weight:700}
.cstack i{display:block;font-style:normal;font-size:8px;color:var(--mut2);letter-spacing:.6px}
.dotlive{width:7px;height:7px;border-radius:50%;background:var(--long);animation:pul 2s infinite}
.dotlive.stale{background:var(--gold)} .dotlive.dead{background:var(--short);animation:none}
@keyframes pul{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--long) 55%,transparent)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
.icbtn{width:34px;height:34px;border-radius:11px;border:1px solid var(--seam);display:grid;place-items:center;color:var(--mut)}
.icbtn:active{transform:scale(.94)}
.icbtn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.icbtn.spin svg{animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

main{padding:12px 0 calc(86px + env(safe-area-inset-bottom))}
.pane{display:none}
.pane.on{display:block;animation:pane .26s ease both}
@keyframes pane{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.ptitle{display:flex;align-items:baseline;gap:9px;margin:4px 2px 11px}
.ptitle h2{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;font-size:18px;letter-spacing:1px}
.ptitle .en{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2.4px;color:var(--gold)}
.ptitle .r{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--mut2)}

/* ============ cards: engraved bullion panels ============ */
.card{
  position:relative;background:linear-gradient(180deg,var(--felt),var(--moss));
  border:1px solid var(--seam);border-radius:var(--r);padding:14px;margin-bottom:11px;
  box-shadow:var(--shadow);
}
.card::before{content:"";position:absolute;left:14px;right:14px;top:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--goldline),transparent)}
.chead{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.chead .tag{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.chead .jp{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:12.5px}
.chead .r{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mut2)}
.kicker{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.6px;color:var(--mut2);text-transform:uppercase;margin:11px 0 4px}
p.body{font-size:12.8px}
.note{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mut2);line-height:1.6}

/* ============ today: hero + mixer rail ============ */
.hero{padding:16px 14px 13px}
.hero .date{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.4px;color:var(--mut)}
.hero .cdrow{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-top:4px}
.hero .big{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:34px;letter-spacing:1px;line-height:1;color:var(--brass);text-shadow:0 0 22px color-mix(in srgb,var(--gold) 35%,transparent)}
.hero .big.open{color:var(--long);text-shadow:0 0 22px color-mix(in srgb,var(--long) 30%,transparent)}
.hero .lab{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:12px;color:var(--mut);padding-bottom:3px}
.chip{font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 10px;border-radius:20px;border:1px solid var(--seam2);color:var(--mut)}
.chip b{color:var(--gold)}
.hero .chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}

/* mixer rail — the signature */
.rail{margin-top:14px}
.rail .scale{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--mut2);padding:0 1px;margin-bottom:3px}
.railbox{position:relative;border:1px solid var(--seam);border-radius:12px;overflow:hidden;
  background:repeating-linear-gradient(90deg,transparent 0,transparent calc(100%/8 - 1px),var(--seam) calc(100%/8 - 1px),var(--seam) calc(100%/8))}
.ch{position:relative;height:24px;border-top:1px solid var(--seam)}
.ch:first-child{border-top:0}
.ch .nm{position:absolute;left:7px;top:50%;transform:translateY(-50%);z-index:3;font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:1px;color:var(--mut)}
.ch .nm i{font-style:normal;color:var(--mut2);margin-left:2px;letter-spacing:.3px}
.ch.live .nm i{color:var(--brass)}
.ch .seg{position:absolute;top:5px;bottom:5px;border-radius:6px;background:color-mix(in srgb,var(--gold) 16%,transparent);border:1px solid var(--goldline)}
.ch.live .seg{background:color-mix(in srgb,var(--gold) 34%,transparent);box-shadow:0 0 14px color-mix(in srgb,var(--gold) 30%,transparent)}
.ch.live .nm{color:var(--brass);font-weight:700}
.ch.closed{opacity:.34}
.ph{position:absolute;top:0;bottom:0;width:2px;background:var(--brass);z-index:4;box-shadow:0 0 10px var(--gold)}
.ph::after{content:"";position:absolute;top:-1px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--brass)}
.rail .legend{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--mut2);margin-top:5px}

/* ticker */
.rail2{display:flex;gap:8px;overflow-x:auto;scroll-snap-type:x proximity;padding:2px 2px 4px;margin:0 -2px 11px;
  mask-image:linear-gradient(90deg,transparent,#000 14px,#000 calc(100% - 14px),transparent)}
.tk{flex:none;scroll-snap-align:start;min-width:96px;background:linear-gradient(180deg,var(--felt),var(--moss));
  border:1px solid var(--seam);border-radius:13px;padding:8px 11px}
.tk .k{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--mut2);letter-spacing:.6px}
.tk .p{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.tk .d{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600}

/* focus strip */
.fstrip{display:flex;gap:9px;overflow-x:auto;scroll-snap-type:x mandatory;padding:2px;margin:0 -2px;
  mask-image:linear-gradient(90deg,transparent,#000 12px,#000 calc(100% - 12px),transparent)}
.fc{flex:none;scroll-snap-align:start;width:158px;border:1px solid var(--seam);border-radius:14px;padding:11px 12px;
  background:linear-gradient(165deg,var(--felt),var(--moss));text-align:left}
.fc .sy{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:13.5px;letter-spacing:.5px}
.fc .pr{font-family:'JetBrains Mono',monospace;font-size:12px;margin-top:1px}
.fc .rw{display:flex;gap:5px;align-items:center;margin-top:7px;flex-wrap:wrap}
.macg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
@media(max-width:520px){.macg{grid-template-columns:repeat(2,1fr)}}
.mi{background:var(--moss);border:1px solid var(--seam);border-radius:11px;padding:8px 10px}
.mi .n{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--mut2)}
.mi .v{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;display:block}
.mi .c{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600}
.week{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px}
.week .ev{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--moss);border:1px solid var(--seam);border-radius:9px;padding:5px 9px}
.week .ev b{color:var(--gold)}

/* ============ badges ============ */
.sesb{font-family:'JetBrains Mono',monospace;font-size:8.5px;padding:2.5px 7px;border-radius:7px;border:1px solid var(--seam2);color:var(--mut);white-space:nowrap}
.sesb.on{color:#141204;background:var(--gold);border-color:var(--gold);font-weight:700}
.star{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:800;padding:2.5px 7px;border-radius:7px;white-space:nowrap}
.star.up{color:var(--long);border:1px solid color-mix(in srgb,var(--long) 55%,transparent)}
.star.down{color:var(--short);border:1px solid color-mix(in srgb,var(--short) 55%,transparent)}
.bp{font-size:10px;font-weight:700;padding:2.5px 9px;border-radius:20px;white-space:nowrap}
.bp.bull{color:var(--long);border:1px solid color-mix(in srgb,var(--long) 45%,transparent)}
.bp.bear{color:var(--short);border:1px solid color-mix(in srgb,var(--short) 45%,transparent)}
.bp.neut{color:var(--flat);border:1px solid color-mix(in srgb,var(--flat) 40%,transparent)}

/* ============ pairs ============ */
.grouphd{display:flex;align-items:center;gap:8px;margin:16px 2px 8px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2.4px;color:var(--mut2);text-transform:uppercase}
.grouphd.on{color:var(--gold)}
.grouphd::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--seam),transparent)}
.pcard{width:100%;text-align:left;display:block;position:relative;border:1px solid var(--seam);border-radius:var(--r);
  background:linear-gradient(180deg,var(--felt),var(--moss));box-shadow:var(--shadow);padding:13px 14px 12px;margin-bottom:10px;overflow:hidden}
.pcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--pc)}
.pcard::after{content:"";position:absolute;left:14px;right:14px;top:0;height:1px;background:linear-gradient(90deg,transparent,var(--goldline),transparent)}
.pcard:active{transform:scale(.992)}
.pr1{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.pr1 .sy{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:14.5px;letter-spacing:.4px}
.pr1 .nm{font-size:10.5px;color:var(--mut)}
.pr1 .r{margin-left:auto;display:flex;gap:5px;align-items:center}
.pr2{display:flex;align-items:baseline;gap:9px;margin-top:5px}
.pr2 .px{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:23px;letter-spacing:.4px;font-variant-numeric:tabular-nums}
.pr2 .chg{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700}
.sparkwrap{height:54px;margin:7px -3px 2px}
.sparkwrap canvas{width:100%;height:100%;display:block}
.rng{margin-top:7px}
.rng .lbl{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--mut2);margin-bottom:3px}
.rng .bar{position:relative;height:7px;border-radius:5px;background:var(--moss);border:1px solid var(--seam)}
.rng .bar i{position:absolute;top:-3px;width:2px;height:11px;border-radius:2px;background:var(--brass);box-shadow:0 0 8px var(--gold)}
.rng .bar u{position:absolute;top:-2px;width:1px;height:9px;background:var(--mut2);opacity:.8}
.pr4{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.machip{font-family:'JetBrains Mono',monospace;font-size:8.5px;padding:2.5px 7px;border-radius:7px;border:1px solid var(--seam2);color:var(--mut)}
.machip.a{color:var(--long);border-color:color-mix(in srgb,var(--long) 45%,transparent)}
.machip.b{color:var(--short);border-color:color-mix(in srgb,var(--short) 45%,transparent)}
.ptag{font-size:9px;color:var(--mut2);font-family:'JetBrains Mono',monospace;margin-top:8px}

/* ============ flow (需給) ============ */
.cs{display:flex;align-items:center;gap:9px;margin:6px 0;font-family:'JetBrains Mono',monospace;font-size:11px}
.cs .cl{width:44px;font-weight:700}
.ct{flex:1;display:flex;height:14px;background:var(--moss);border:1px solid var(--seam);border-radius:8px;overflow:hidden}
.ct .h{flex:1;display:flex}.ct .h.l{justify-content:flex-end}.ct .m{width:1px;flex:none;background:var(--seam2)}
.ct .f{height:100%}
.ct .f.pos{background:linear-gradient(90deg,color-mix(in srgb,var(--long) 50%,transparent),var(--long));border-radius:0 6px 6px 0;transform-origin:left}
.ct .f.neg{background:linear-gradient(270deg,color-mix(in srgb,var(--short) 50%,transparent),var(--short));border-radius:6px 0 0 6px;transform-origin:right}
.pane.on .ct .f{animation:grow .7s cubic-bezier(.2,.85,.25,1) both}
@keyframes grow{from{transform:scaleX(0)}}
.cs .cv{width:56px;text-align:right;color:var(--mut)}
.cs .cvw{width:96px;text-align:right;line-height:1.15}
.cs .cvw small{color:var(--mut2);font-size:8.5px}
.posrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-top:1px solid var(--seam);font-size:11px}
.posrow:first-of-type{border-top:0}
.posrow .sy{font-family:'JetBrains Mono',monospace;font-weight:800;width:66px}
.posrow .cotp{font-family:'JetBrains Mono',monospace;font-size:9.5px;line-height:1.3}
.posrow .cotp small{color:var(--mut2);font-size:8.5px}
.slbar{flex:1;min-width:64px;height:9px;border-radius:6px;overflow:hidden;display:flex;border:1px solid var(--seam)}
.slbar .s{background:color-mix(in srgb,var(--short) 70%,transparent)}
.slbar .l{background:color-mix(in srgb,var(--long) 70%,transparent)}
.slnum{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--mut);width:64px;text-align:right}
.vb{font-size:9px;padding:2.5px 8px;border-radius:10px;white-space:nowrap;flex:none}
.vb.x{color:var(--short);border:1px solid color-mix(in srgb,var(--short) 45%,transparent)}
.vb.o{color:var(--long);border:1px solid color-mix(in srgb,var(--long) 45%,transparent)}
.vb.n{color:var(--flat);border:1px solid color-mix(in srgb,var(--flat) 40%,transparent)}

/* ============ news ============ */
.bsum{font-size:13.4px;line-height:1.75;padding:12px 13px;background:var(--moss);border:1px solid var(--seam);border-radius:12px}
.bsum::first-letter{color:var(--gold)}
.bankrow{display:flex;gap:9px;padding:8px 0;border-top:1px solid var(--seam)}
.bankrow:first-of-type{border-top:0}
.bankname{flex:none;width:92px;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--gold);font-weight:700;line-height:1.5;padding-top:2px}
.bankview{flex:1;font-size:12.2px;line-height:1.6}
.topic{margin:12px 0 3px;display:flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.4px;text-transform:uppercase}
.topic.dr{color:var(--c-eu)}.topic.iv{color:var(--gold)}.topic.rk{color:var(--short)}
.src{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--mut2);border:1px solid var(--seam2);border-radius:5px;padding:1.5px 6px;margin:3px 4px 0 0;cursor:pointer}
.src:active{color:var(--gold)}

/* ============ score ============ */
.sc-tabs{display:flex;gap:6px;overflow-x:auto;padding:2px;margin:0 -2px 10px;
  mask-image:linear-gradient(90deg,transparent,#000 10px,#000 calc(100% - 10px),transparent)}
.sc-tab{flex:none;font-family:'JetBrains Mono',monospace;font-size:11px;padding:7px 12px;border-radius:10px;border:1px solid var(--seam);background:var(--moss);color:var(--mut)}
.sc-tab.on{color:#141204;background:var(--brass);border-color:var(--brass);font-weight:800}
.sc-dir{display:flex;gap:6px;margin-bottom:13px}
.sc-dir button{flex:1;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:800;padding:9px;border-radius:11px;border:1px solid var(--seam);background:var(--moss);color:var(--mut)}
.sc-dir button.on.long{color:#06140d;background:var(--long);border-color:var(--long)}
.sc-dir button.on.short{color:#1a0606;background:var(--short);border-color:var(--short)}
@property --p{syntax:'<number>';initial-value:0;inherits:false}
.sc-gauge{display:flex;align-items:center;gap:16px;margin:4px 0 12px}
.sc-ring{width:96px;height:96px;border-radius:50%;flex:none;position:relative;transition:--p .6s ease;
  background:conic-gradient(var(--gc,var(--long)) calc(var(--p,0)*1%),var(--seam) 0)}
.sc-ring::before{content:"";position:absolute;inset:9px;border-radius:50%;background:var(--felt);border:1px solid var(--seam)}
.sc-ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:22px}
.sc-tier{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;font-size:19px}
.sc-verdict{font-size:11px;color:var(--mut);font-family:'JetBrains Mono',monospace;margin-top:2px}
.sc-flags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.sc-flag{font-size:9px;font-family:'JetBrains Mono',monospace;padding:2.5px 8px;border-radius:10px;border:1px solid var(--short);color:var(--short)}
.sc-flag.ok{border-color:var(--long);color:var(--long)}
.sc-f{display:flex;align-items:center;gap:9px;padding:6px 0;border-top:1px solid var(--seam);font-size:11.5px}
.sc-f .ic{width:14px;text-align:center;font-family:'JetBrains Mono',monospace;font-weight:800;flex:none}
.sc-f .fl{flex:1}.sc-f .fl small{color:var(--mut2);font-size:9.5px}
.sc-f .fr{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mut2)}
.sc-f.sup .ic{color:var(--long)}.sc-f.ag .ic{color:var(--short)}.sc-f.nu .ic{color:var(--flat)}

/* ================= config ================= */

  EURUSD:{n:'ユーロドル',c:'var(--c-eu)',q:'EURUSD',cot:'EUR',base:'EUR',quote:'USD',dec:4,liq:22.7,ses:['LDN','NY'],tag:'最大流動性・対ドル基軸・米欧金利差'},

  USDCAD:{n:'米ドル/加ドル',c:'var(--c-uc)',q:'USDCAD',cot:'CAD',base:'USD',quote:'CAD',dec:4,liq:5.5,ses:['NY'],tag:'原油相関・北米指標'},

};

};
var SRC={'InvestingLive':'https://investinglive.com','みずほ':'https://www.mizuhobank.co.jp/market/index.html','SMBC':'https://www.smbc.co.jp/market/pdf/comment.pdf','MUFG':'https://www.mufgresearch.com/fx/','Myfxbook':'https://www.myfxbook.com/community/outlook','FXSSI':'https://fxssi.com/tools/current-ratio','Minkabu':'https://fx.minkabu.jp/news','CFTC':'https://www.tradingster.com/cot','FMP':'https://financialmodelingprep.com/'};

/* ================= time / sessions (DST-aware) ================= */
function tzParts(tz,date){var f=new Intl.DateTimeFormat('en-US',{timeZone:tz,hour12:false,weekday:'short',hour:'2-digit',minute:'2-digit'});var o={};f.formatToParts(date).forEach(function(p){o[p.type]=p.value;});if(o.hour==='24')o.hour='00';return o;}
function tzOffMin(tz,date){var f=new Intl.DateTimeFormat('en-US',{timeZone:tz,hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});var o={};f.formatToParts(date).forEach(function(p){o[p.type]=p.value;});if(o.hour==='24')o.hour='00';var asUTC=Date.UTC(+o.year,+o.month-1,+o.day,+o.hour,+o.minute,+o.second);return Math.round((asUTC-date.getTime())/6e4);}
function sesActive(k,date){var s=SESS[k],pr=tzParts(s.tz,date),hr=+pr.hour+(+pr.minute)/60,wd=pr.weekday;if(wd==='Sat'||wd==='Sun')return false;return hr>=s.o&&hr<s.c;}
function msUntilOpen(k,date){var s=SESS[k],off=tzOffMin(s.tz,date),lnMs=date.getTime()+off*6e4,ln=new Date(lnMs);
  for(var add=0;add<8;add++){var t=Date.UTC(ln.getUTCFullYear(),ln.getUTCMonth(),ln.getUTCDate()+add,s.o,0,0);if(t<=lnMs)continue;var wd=new Date(t).getUTCDay();if(wd===6||wd===0)continue;return (t-off*6e4)-date.getTime();}
  return null;}
function pairSession(p,date){var list=PC[p].ses||[],active=false,activeName='',best=null;
  list.forEach(function(k){if(sesActive(k,date)){active=true;if(!activeName)activeName=SESS[k].jp;}else{var ms=msUntilOpen(k,date);if(ms!=null&&(best==null||ms<best.ms))best={ms:ms,name:SESS[k].jp};}});
  return {active:active,activeName:activeName,next:best};}
function fmtDur(ms){if(ms==null)return'—';if(ms<0)ms=0;var h=Math.floor(ms/36e5),m=Math.floor(ms%36e5/6e4);return h>0?(h+'h'+pad(m)+'m'):(m+'m');}
function sesBadgeTxt(p,now){var st=pairSession(p,now);return st.active?((st.activeName==='NY'?'':'⚡')+st.activeName):(st.next?(st.next.name+' '+fmtDur(st.next.ms)):'—');}
function nextWed1230(){var n=new Date(),day=n.getUTCDay(),add=(3-day+7)%7;var t=new Date(Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),n.getUTCDate()+add,12,30,0));if(t.getTime()<n.getTime())t=new Date(t.getTime()+7*864e5);return t.getTime();}

/* ================= confluence math (unchanged logic) ================= */
function strengthMap(){var m={};((DATA&&DATA.strength)||[]).forEach(function(x){m[x.ccy]=x.score;});return m;}
function autoFactors(p){
  var cf=PC[p],pr=(DATA.prices&&DATA.prices[cf.q])||{},sm=strengthMap(),cot=DATA.cot||{},ret=(DATA.analysis&&DATA.analysis.retail&&DATA.analysis.retail[p])||{};
  var F=[];var htf=0,note='—';
  if(pr.price!=null&&pr.ma50&&pr.ma200){if(pr.price>pr.ma50&&pr.price>pr.ma200){htf=1;note='MA上＝上昇';}else if(pr.price<pr.ma50&&pr.price<pr.ma200){htf=-1;note='MA下＝下降';}else{htf=0;note='MA混在';}}
  else note='MA無し(算出値)';
  F.push({k:'HTF移動平均',w:3,sign:htf,note:note});
  var st=0,sn='';
  if(p==='XAUUSD'){st=sgn(-(sm.USD||0));sn='USD '+((sm.USD||0)>0?'強→金逆風':'弱→金支持');}
  else{var diff=(sm[cf.base]||0)-(sm[cf.quote]||0);st=sgn(diff);sn=cf.base+(diff>0?'>':'<')+cf.quote;}
  F.push({k:'通貨強弱',w:2,sign:st,note:sn});
  var cs=0,cn='';
  if(p==='USDJPY'){var j=cot.JPY;if(j){cs=sgn(-j.net);cn='円'+(j.net<0?'売越→USDJPY支持':'買越');}}
  else if(p==='EURJPY'){var e=cot.EUR,jj=cot.JPY;if(e&&jj){cs=sgn(sgn(e.net)-sgn(jj.net));cn='EUR/円建玉から';}}
  else if(p==='GBPJPY'){var g=cot.GBP,j2=cot.JPY;if(g&&j2){cs=sgn(sgn(g.net)-sgn(j2.net));cn='GBP/円建玉から';}}
  else if(p==='USDCAD'){var cc=cot.CAD;if(cc){cs=sgn(-cc.net);cn='加ドル'+(cc.net<0?'売越→USDCAD支持':'買越→USDCAD重い');}}
  else{var c=cot[cf.cot];if(c){cs=sgn(c.net);cn='ネット'+(c.net>0?'買越':'売越')+' '+fmtN(c.net);}}
  F.push({k:'大口COT',w:2,sign:cs,note:cn});
  var rs=0,rn='要確認';
  if(ret.s!=null){rs=ret.s>52?1:ret.s<48?-1:0;rn='個人S'+ret.s+'→逆張り'+(rs>0?'買い':rs<0?'売り':'中立')+'寄り';}
  F.push({k:'個人(逆張り)',w:1.5,sign:rs,note:rn});
  return F;
}
function autoConv(p){var F=autoFactors(p),pos=0,neg=0,tot=0;F.forEach(function(f){tot+=f.w;if(f.sign>0)pos+=f.w;else if(f.sign<0)neg+=f.w;});if(!tot)return{dir:0,mag:0};var net=(pos-neg)/tot;return{dir:net>0?1:net<0?-1:0,mag:Math.abs(net)};}

/* ================= state ================= */
var DATA=null, OFFLINE=false, LASTLOAD=0;
var UI={tab:'today', sheet:null};

PAIRS.forEach(function(p){SC.man[p]={};});
var SCMAN=[{id:'wave',k:'第3波',w:2.5},{id:'bos',k:'構造順',w:2},{id:'ote',k:'OTE/Fib',w:1.5},{id:'vwap',k:'VWAP順',w:1},{id:'cci',k:'CCIヴィトーなし',w:1},{id:'rr',k:'RR≥2',w:0,gate:true}];
var WB={overview:true,news:true,session:true,top:false,strength:false,score:false};
var WB_DEF=[['overview','概況'],['news','ニュース要約'],['session','セッション'],['top','主要レート'],['strength','通貨強弱'],['score','本日の妙味']];

/* ================= sparkline ================= */
function drawSpark(cv,arr,opts){
  opts=opts||{};
  var w=cv.clientWidth,h=cv.clientHeight;if(!w||!h)return;
  var dpr=Math.min(2,window.devicePixelRatio||1);
  cv.width=w*dpr;cv.height=h*dpr;
  var g=cv.getContext('2d');g.scale(dpr,dpr);g.clearRect(0,0,w,h);
  var css=getComputedStyle(document.body);
  var cLong=css.getPropertyValue('--long').trim(),cShort=css.getPropertyValue('--short').trim(),cMut=css.getPropertyValue('--mut2').trim(),cSeam=css.getPropertyValue('--seam2').trim();
  if(!arr||arr.length<2){g.strokeStyle=cSeam;g.setLineDash([3,4]);g.beginPath();g.moveTo(4,h/2);g.lineTo(w-4,h/2);g.stroke();g.setLineDash([]);g.fillStyle=cMut;g.font='8px JetBrains Mono';g.fillText('30D —',6,h/2-5);return;}
  var refs=(opts.refs||[]).filter(function(r){return r&&isFinite(r.v);});
  var lo=Math.min.apply(null,arr),hi=Math.max.apply(null,arr);
  refs.forEach(function(r){lo=Math.min(lo,r.v);hi=Math.max(hi,r.v);});
  if(hi===lo){hi+=1e-9;}
  var padT=opts.big?12:6,padB=opts.big?8:5,padL=4,padR=opts.big?40:6;
  var X=function(i){return padL+(w-padL-padR)*i/(arr.length-1);};
  var Y=function(v){return padT+(h-padT-padB)*(1-(v-lo)/(hi-lo));};
  var upTrend=arr[arr.length-1]>=arr[0];var col=upTrend?cLong:cShort;
  // refs (MA lines)
  refs.forEach(function(r){var y=Y(r.v);g.strokeStyle=cSeam;g.setLineDash([4,4]);g.beginPath();g.moveTo(padL,y);g.lineTo(w-padR+(opts.big?2:0),y);g.stroke();g.setLineDash([]);
    if(opts.big){g.fillStyle=cMut;g.font='8.5px JetBrains Mono';g.fillText(r.label,w-padR+5,y+3);}});
  function paint(n){
    g.clearRect(0,0,w,h);
    refs.forEach(function(r){var y=Y(r.v);g.strokeStyle=cSeam;g.setLineDash([4,4]);g.beginPath();g.moveTo(padL,y);g.lineTo(w-padR+(opts.big?2:0),y);g.stroke();g.setLineDash([]);
      if(opts.big){g.fillStyle=cMut;g.font='8.5px JetBrains Mono';g.fillText(r.label,w-padR+5,y+3);}});
    var m=Math.max(2,Math.round(arr.length*n));
    g.beginPath();g.moveTo(X(0),Y(arr[0]));
    for(var i=1;i<m;i++)g.lineTo(X(i),Y(arr[i]));
    var lastX=X(m-1),lastY=Y(arr[m-1]);
    g.lineTo(lastX,h-padB+3);g.lineTo(X(0),h-padB+3);g.closePath();
    g.globalAlpha=.14;g.fillStyle=col;g.fill();g.globalAlpha=1;
    g.beginPath();g.moveTo(X(0),Y(arr[0]));
    for(var j=1;j<m;j++)g.lineTo(X(j),Y(arr[j]));
    g.strokeStyle=col;g.lineWidth=opts.big?2:1.6;g.lineJoin='round';g.stroke();
    g.beginPath();g.arc(lastX,lastY,opts.big?3:2.4,0,7);g.fillStyle=col;g.fill();
    if(opts.big){g.fillStyle=cMut;g.font='8.5px JetBrains Mono';g.fillText('30D',padL+1,padT-3);}
  }
  if(RM){paint(1);return;}
  var t0=performance.now(),dur=480;
  (function step(t){var n=Math.min(1,(t-t0)/dur);paint(n);if(n<1)requestAnimationFrame(step);})(t0);
}

function countUp(el,target,dec){
  if(RM||target==null||isNaN(target)){el.textContent=target==null?'—':Number(target).toFixed(dec);return;}
  var t0=performance.now(),dur=600,from=target*0.985;
  (function s(t){var n=Math.min(1,(t-t0)/dur);var v=from+(target-from)*(1-Math.pow(1-n,3));el.textContent=v.toFixed(dec);if(n<1)requestAnimationFrame(s);})(t0);
}

    '<div class="sc-gauge"><div class="sc-ring" id="scRing"><span class="pct" id="scPct">0%</span></div>'+
    '<div style="flex:1;min-width:0"><div class="sc-tier disp" id="scTier">—</div><div class="sc-verdict" id="scVerdict"></div><div class="sc-flags" id="scFlags"></div></div></div>'+
    '<div class="kicker">マクロ要因（自動・取得データ）</div><div id="scAuto"></div>'+
    '<div class="kicker">チャート確認（タップで加点）</div><div id="scManual"></div>'+
    '<p class="note" id="scNote" style="margin-top:8px"></p></div>';
  $('#p-score').innerHTML=H;
  $('#scLong').onclick=function(){SC.dir=1;scRender();};
  $('#scShort').onclick=function(){SC.dir=-1;scRender();};
  scRender();
}
function scRender(){
  if(!$('#scTabs'))return;
  $('#scTabs').innerHTML=PAIRS.map(function(p){return '<button class="sc-tab'+(p===SC.cur?' on':'')+'" data-p="'+p+'">'+p+'</button>';}).join('');
  $$('.sc-tab').forEach(function(t){t.onclick=function(){SC.cur=this.getAttribute('data-p');scRender();};});
  $('#scLong').className='long'+(SC.dir===1?' on':'');
  $('#scShort').className='short'+(SC.dir===-1?' on':'');
  var F=autoFactors(SC.cur),dir=SC.dir,man=SC.man[SC.cur],sup=0,tot=0,html='';
  F.forEach(function(f){tot+=f.w;var st=(f.sign===dir)?'sup':(f.sign===0?'nu':'ag');if(st==='sup')sup+=f.w;
    var ic=st==='sup'?'✓':st==='ag'?'✕':'–';
    html+='<div class="sc-f '+st+'"><span class="ic">'+ic+'</span><span class="fl">'+f.k+' <small>'+esc(f.note)+'</small></span><span class="fr">w'+f.w+'</span></div>';});
  $('#scAuto').innerHTML=html;
  $('#scManual').innerHTML=SCMAN.map(function(f){return '<button class="sc-chip'+(man[f.id]?' on':'')+(f.gate?' gate':'')+'" data-id="'+f.id+'">'+(man[f.id]?'✓ ':'')+f.k+(f.w?' (w'+f.w+')':'')+'</button>';}).join('');
  $$('.sc-chip').forEach(function(c){c.onclick=function(){man[this.getAttribute('data-id')]=!man[this.getAttribute('data-id')];scRender();};});
  SCMAN.forEach(function(f){if(f.gate)return;tot+=f.w;if(man[f.id])sup+=f.w;});
  var pct=Math.round(sup/tot*100),flags=[],cap=1,veto=false;
  var ps=pairSession(SC.cur,new Date()),inSes=ps.active;
  flags.push({t:inSes?'優位セッション中('+ps.activeName+')':'セッション優位外',ok:inSes});if(!inSes)cap=2;
  var cm=(nextWed1230()-Date.now())/6e4;if(cm>0&&cm<30){flags.push({t:'CPI直前=回避',ok:false});veto=true;}
  if(man.rr)flags.push({t:'RR≥2',ok:true});else{flags.push({t:'RR<2/未確認',ok:false});cap=Math.max(cap,2);}
  var cotG=DATA.cot&&DATA.cot.GOLD,gpr=DATA.prices&&DATA.prices.GCUSD;
  if(SC.cur==='XAUUSD'&&dir===1&&cotG&&cotG.net>120000&&gpr&&gpr.chg<0){flags.push({t:'COTロング過熱',ok:false});cap=Math.max(cap,2);}
  var uj=DATA.prices&&DATA.prices.USDJPY;
  if(SC.cur==='USDJPY'&&dir===1&&uj&&uj.yearHigh&&uj.price>=uj.yearHigh-0.4){flags.push({t:'介入帯警戒',ok:false});cap=Math.max(cap,2);}
  var tier;if(pct>=72)tier=1;else if(pct>=55)tier=2;else if(pct>=42)tier=3;else tier=0;
  if(tier>0)tier=Math.max(tier,cap);if(veto)tier=0;
  var tierTxt=['見送り','ティア1（フル）','ティア2（縮小）','ティア3（打診）'][tier];
  var gc=dir===1?'var(--long)':'var(--short)';
  var ring=$('#scRing');ring.style.setProperty('--p',pct);ring.style.setProperty('--gc',gc);
  $('#scPct').textContent=pct+'%';$('#scPct').style.color=gc;
  var te=$('#scTier');te.textContent=tierTxt;te.style.color=tier===0?'var(--flat)':tier===1?'var(--long)':'var(--gold)';
  $('#scVerdict').textContent=SC.cur+' '+(dir===1?'買い':'売り')+'：適合度 '+pct+'%';
  $('#scFlags').innerHTML=flags.map(function(f){return '<span class="sc-flag'+(f.ok?' ok':'')+'">'+f.t+'</span>';}).join('');
  $('#scNote').textContent='あなたのルール整理＝判断材料（売買助言ではありません）。チャート項目は5M/15Mで確認しタップ。';
}

/* ================= pair sheet ================= */
function openPair(p){
  UI.sheet=p;
  var cf=PC[p],pr=(DATA.prices&&DATA.prices[cf.q])||{};
  var pa=(DATA.analysis&&DATA.analysis.pairs&&DATA.analysis.pairs[p])||{};
  $('#shSy').textContent=p;$('#shNm').textContent=cf.n;
  var chg=pr.chg!=null?((pr.chg>0?'+':'')+Number(pr.chg).toFixed(2)+'%'):(pr.derived?'算出':'');
  var cot=DATA.cot||{},ck=cf.cot,c=cot[ck];
  var ret=(DATA.analysis&&DATA.analysis.retail&&DATA.analysis.retail[p])||{};
  var chips='<span class="sesb" data-co="'+p+'">'+sesBadgeTxt(p,new Date())+'</span>';
  if(c)chips+='<span class="chip">COT <b>'+(c.net>0?'+':'')+fmtN(c.net)+'</b></span>';
  if(ret.s!=null)chips+='<span class="chip">個人 <b>S'+ret.s+'/L'+(ret.l!=null?ret.l:100-ret.s)+'</b></span>';
  var yr='';
  if(pr.yearLow!=null&&pr.yearHigh!=null&&pr.price!=null&&pr.yearHigh>pr.yearLow){
    var ypos=Math.min(100,Math.max(0,(pr.price-pr.yearLow)/(pr.yearHigh-pr.yearLow)*100));
    yr='<div class="rng" style="margin-top:10px"><div class="lbl"><span>年安 '+pr.yearLow+'</span><span>年初来レンジ</span><span>年高 '+pr.yearHigh+'</span></div><div class="bar"><i style="left:calc('+ypos.toFixed(1)+'% - 1px)"></i></div></div>';
  }
  var day='';
  if(pr.low!=null&&pr.high!=null&&pr.price!=null&&pr.high>pr.low){
    var pos=Math.min(100,Math.max(0,(pr.price-pr.low)/(pr.high-pr.low)*100));
    day='<div class="rng" style="margin-top:10px"><div class="lbl"><span>安 '+pr.low+'</span><span>日中レンジ</span><span>高 '+pr.high+'</span></div><div class="bar"><i style="left:calc('+pos.toFixed(1)+'% - 1px)"></i></div></div>';
  }
  function sec(cls,icon,t,body){return body?'<div class="topic '+cls+'">'+icon+' '+t+'</div><p class="body">'+esc(body)+'</p>':'';}
  var B='<div class="bigpx"><span class="px">'+(pr.price!=null?Number(pr.price).toFixed(cf.dec):'—')+'</span><span class="chg '+(pr.chg>0?'up':pr.chg<0?'down':'mid')+'">'+chg+'</span></div>'+
    '<div class="chiprow">'+chips+'</div>'+
    '<div class="bigchart"><canvas id="bigcv"></canvas></div>'+day+yr+
    '<p class="note" style="margin-top:8px">'+cf.tag+'｜流動性 約'+cf.liq+'%｜優位 '+cf.ses.map(function(k){return SESS[k].jp;}).join('・')+(pr.derived?'｜合成値（MAは構成ペア参照）':'')+'</p>'+
    sec('dr','◈','相場観・トレンド',pa.trend)+
    sec('dr','◈','関連ニュース（統合）',pa.news)+
    sec('iv','◎','テクニカル戦略',pa.strategy)+
    sec('iv','◎','警戒価格帯',pa.levels)+
    sec('rk','◍','大口×個人',pa.cotRead)+
    sec('rk','▲','リスク',pa.risk)+
    (!pa.trend?'<p class="body" style="color:var(--mut)">分析未生成（数値は上部参照）。</p>':'')+
    '<button class="gotosc" data-gosc="'+p+'">この銘柄を採点する →</button>';
  $('#shBody').innerHTML=B;
  $('#shBody').scrollTop=0;
  $('#scrim1').classList.add('on');$('#sheetPair').classList.add('on');
  try{history.pushState({mmSheet:p},'');}catch(e){}
  var arr=DATA&&DATA.spark&&(DATA.spark[cf.q]||DATA.spark[p]);
  var refs=[];if(pr.ma50)refs.push({v:+pr.ma50,label:'MA50'});if(pr.ma200)refs.push({v:+pr.ma200,label:'MA200'});
  requestAnimationFrame(function(){drawSpark($('#bigcv'),arr,{big:true,refs:refs});});
  var go=$('#shBody [data-gosc]');if(go)go.onclick=function(){SC.cur=p;closeSheets(true);showTab('score');scRender();};
  if(navigator.vibrate&&!RM)try{navigator.vibrate(6);}catch(e){}
}
function closeSheets(skipHist){
  UI.sheet=null;
  $('#scrim1').classList.remove('on');$('#sheetPair').classList.remove('on');
  $('#scrim2').classList.remove('on');$('#sheetSet').classList.remove('on');
  if(!skipHist&&history.state&&history.state.mmSheet){try{history.back();}catch(e){}}
}
window.addEventListener('popstate',function(){closeSheets(true);});
function bindOpeners(root){$$('[data-open]',root).forEach(function(el){el.onclick=function(){openPair(this.getAttribute('data-open'));};});}

/* ================= settings sheet ================= */
function widgetURL(){var on=WB_DEF.filter(function(d){return WB[d[0]];}).map(function(d){return d[0];});if(!on.length)on=['overview'];return './widget.html?b='+on.join(',');}

  var B='<div class="setrow"><div><div class="t">ダークテーマ</div><div class="d">ブリオン（暗）／ペーパー（明）</div></div>'+

    '<div class="wchips" id="wbChips"></div>'+
    '<div class="wurl" id="wbUrl"></div><a class="wopen" id="wbOpen" target="_blank" rel="noopener">開く ↗</a>'+
    '<div class="d" style="margin-top:9px">KWGT用データ: </div><div class="wurl" id="wbData"></div>'+
    '<div class="wprev"><iframe id="wbPrev" title="widget preview"></iframe></div></div>'+
    '<div class="setrow" style="display:block"><div class="t">データ鮮度</div>'+fresh+errs+'</div>'+
    '<div class="setrow" style="display:block"><div class="t">情報源（長押しで元ページ）</div>'+

    '<p class="note" style="margin-top:7px">サーバー側で3時間ごと取得→本アプリは描画のみ。本アプリは判断材料の整理であり売買助言ではありません。</p>'+
    '<p class="note" style="margin-top:5px">MACRO MIXER · build 2</p></div>';
  $('#setBody').innerHTML=B;
  $('#tglTheme').onclick=function(){
    var d=document.body.getAttribute('data-theme')==='dark';
    document.body.setAttribute('data-theme',d?'light':'dark');
    try{localStorage.setItem('mm-theme',d?'light':'dark');}catch(e){}
    this.classList.toggle('on',!d);
    renderAll();
  };
  wbBind();bindSrc($('#setBody'));
  $('#scrim2').classList.add('on');$('#sheetSet').classList.add('on');

function wbBind(){
  var c=$('#wbChips');if(!c)return;
  c.innerHTML=WB_DEF.map(function(d){return '<button class="wchip'+(WB[d[0]]?' on':'')+'" data-b="'+d[0]+'">'+d[1]+'</button>';}).join('');
  $$('.wchip',c.parentNode).forEach(function(ch){ch.onclick=function(){WB[this.getAttribute('data-b')]=!WB[this.getAttribute('data-b')];wbBind();};});
  var u=widgetURL(),abs=new URL(u,location.href).href;
  $('#wbUrl').textContent=abs;$('#wbOpen').href=u;

/* ================= sources long-press ================= */
function bindSrc(root){
  $$('.src',root).forEach(function(el){
    var url=SRC[el.textContent.trim()];if(!url)return;el.title='長押しで出所へ';
    var t;function start(){t=setTimeout(function(){window.open(url,'_blank','noopener');},420);}
    function cancel(){clearTimeout(t);}
    el.addEventListener('pointerdown',start);el.addEventListener('pointerup',cancel);
    el.addEventListener('pointerleave',cancel);el.addEventListener('pointermove',cancel);
    el.addEventListener('contextmenu',function(e){e.preventDefault();});
  });
}

/* ================= router / dock ================= */
function showTab(tab){
  UI.tab=tab;
  $$('.pane').forEach(function(p){p.classList.remove('on');});
  var el=$('#p-'+tab);if(el)el.classList.add('on');
  $$('.dk').forEach(function(d){d.classList.toggle('on',d.getAttribute('data-tab')===tab);});
  if(location.hash!=='#'+tab){try{history.replaceState(null,'','#'+tab);}catch(e){}}
  if(tab==='pairs'&&DATA)requestAnimationFrame(function(){drawPaneSparks($('#p-pairs'));});
  window.scrollTo({top:0,behavior:RM?'auto':'smooth'});
}
$('#dock').addEventListener('click',function(e){
  var b=e.target.closest('.dk');if(!b)return;
  if(navigator.vibrate&&!RM)try{navigator.vibrate(5);}catch(err){}
  showTab(b.getAttribute('data-tab'));
});
function route(){
  var h=(location.hash||'#today').slice(1);
  var m=h.match(/^pair\/(\w+)$/);
  if(m&&PC[m[1]]){showTab('pairs');if(DATA)openPair(m[1]);return;}
  if(['today','pairs','flow','news','score'].indexOf(h)<0)h='today';
  showTab(h);
}
window.addEventListener('hashchange',route);

/* ================= live tick ================= */
function tick(){
  var now=new Date();
  var t=now.toISOString();
  var jt=new Date(now.getTime()+9*36e5).toISOString();
  var u=$('#utc');if(u)u.textContent='UTC '+t.slice(11,16);
  var j=$('#jst');if(j)j.textContent=jt.slice(11,19)+' JST';
  var u2=$('#utc2');if(u2)u2.textContent=t.slice(11,16);
  var j2=$('#jst2');if(j2)j2.textContent=jt.slice(11,16);
  // hero countdown: next session open among all
  var order=['SYD','TOK','LDN','NY'],nextK=null,nextMs=null;
  order.forEach(function(k){if(!sesActive(k,now)){var ms=msUntilOpen(k,now);if(ms!=null&&(nextMs==null||ms<nextMs)){nextMs=ms;nextK=k;}}});
  var hc=$('#heroCd'),hl=$('#heroLab');
  if(hc){
    var anyOpen=order.some(function(k){return sesActive(k,now);});
    if(nextK!=null&&!anyOpen){var s=Math.floor(nextMs/1000);hc.textContent=pad(Math.floor(s/3600))+':'+pad(Math.floor(s%3600/60))+':'+pad(s%60);hc.classList.remove('open');hl.textContent=SESS[nextK].jp+'開場まで';}
    else if(nextK!=null){var s2=Math.floor(nextMs/1000);hc.textContent=pad(Math.floor(s2/3600))+':'+pad(Math.floor(s2%3600/60))+':'+pad(s2%60);hc.classList.remove('open');hl.textContent='次：'+SESS[nextK].jp+'開場（取引時間中）';}
    else{hc.textContent='OPEN';hc.classList.add('open');hl.textContent='主要市場 取引時間中';}
  }
  // CPI chip
  var cpi=nextWed1230()-now.getTime(),ce=$('#cpiCd');
  if(ce){if(cpi<=0)ce.textContent='発表時間帯';else{var d=Math.floor(cpi/864e5),hh=Math.floor(cpi%864e5/36e5),mm=Math.floor(cpi%36e5/6e4);ce.textContent=d+'日'+pad(hh)+':'+pad(mm);}}
  // rail playhead (JST axis) + channel live state
  var ph=$('#ph');
  if(ph){
    var mins=(now.getUTCHours()*60+now.getUTCMinutes()+now.getUTCSeconds()/60+540)%1440;
    ph.style.left='calc('+(mins/14.4)+'% - 1px)';
    order.forEach(function(k){var ch=document.querySelector('[data-ch="'+k+'"]');if(ch)ch.classList.toggle('live',sesActive(k,now));});
    var rn=$('#railNote');if(rn){var openNames=order.filter(function(k){return sesActive(k,now);}).map(function(k){return SESS[k].jp;});rn.textContent=openNames.length?('▶ '+openNames.join('・')):'休場時間帯';}
  }
  // all session badges
  $$('[data-co]').forEach(function(el){
    var p=el.getAttribute('data-co');var st=pairSession(p,now);
    el.classList.toggle('on',st.active);
    el.textContent=st.active?((st.activeName==='NY'?'':'⚡')+st.activeName):(st.next?(st.next.name+' '+fmtDur(st.next.ms)):'—');
  });
}
setInterval(tick,1000);

/* ================= load ================= */
function skel(){
  ['#p-today','#p-pairs','#p-flow','#p-news','#p-score'].forEach(function(s){
    $(s).innerHTML='<div class="sk" style="height:150px"></div><div class="sk"></div><div class="sk"></div><div class="sk" style="height:120px"></div>';
  });
}
function renderAll(){
  if(!DATA)return;
  renderToday();renderPairs();renderFlow();renderNews();renderScore();
  var up=new Date(DATA.updated);
  var hrs=(Date.now()-up.getTime())/36e5;
  var dot=$('#liveDot');dot.className='dotlive'+(OFFLINE?' dead':hrs>6?' stale':'');
  $('#banner').innerHTML=(OFFLINE?'<div class="banner">オフライン表示（最終更新 '+up.toLocaleString('ja-JP')+'）。オンライン復帰で自動更新。</div>':'')+
    (!OFFLINE&&hrs>6?'<div class="banner">⚠ 約'+Math.floor(hrs)+'時間前のデータ（ソース更新待ち）</div>':'');
  $('#foot').innerHTML='最終更新 '+up.toLocaleString('ja-JP')+' ／ 3時間ごと自動更新（UTC 0·3·6·9·12·15·18·21時）<br>判断材料の整理であり売買助言ではありません。詳細・出所・鮮度は ⚙ 設定。';
  if(UI.tab==='pairs')requestAnimationFrame(function(){drawPaneSparks($('#p-pairs'));});
  tick();
}
async function load(manual){
  var btn=$('#btnRefresh');btn.classList.add('spin');
  var ctrl=new AbortController(),t=setTimeout(function(){ctrl.abort();},12000);
  try{
    var r=await fetch('./data.json?t='+Date.now(),{signal:ctrl.signal,cache:'no-store'});
    clearTimeout(t);
    var d=await r.json();
    if(!r.ok||!d||!d.prices)throw new Error('bad');
    DATA=d;OFFLINE=false;LASTLOAD=Date.now();renderAll();
  }catch(e){
    clearTimeout(t);
    try{var c=await fetch('./data.json');DATA=await c.json();OFFLINE=true;LASTLOAD=Date.now();renderAll();}
    catch(e2){if(!DATA)$('#p-today').innerHTML='<div class="card"><p class="body down">データ取得に失敗しました。通信環境を確認して ↻ を押してください。</p></div>';}
  }
  btn.classList.remove('spin');
}
$('#btnRefresh').onclick=function(){load(true);};
$('#btnSet').onclick=openSet;
$('#shX').onclick=function(){closeSheets();};
$('#setX').onclick=function(){closeSheets();};
$('#scrim1').onclick=function(){closeSheets();};
$('#scrim2').onclick=function(){closeSheets();};
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&Date.now()-LASTLOAD>15*60*1000)load();
});

/* theme restore */
try{var th=localStorage.getItem('mm-theme');if(th)document.body.setAttribute('data-theme',th);}catch(e){}
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(function(){});}

skel();
route();
load();
setInterval(load,3*60*60*1000);
</script>
